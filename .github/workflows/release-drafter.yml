name: Release Drafter
on:
  push:
    branches:
      - master
jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v7
        with:
          commitish: master
          filter-by-range: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
