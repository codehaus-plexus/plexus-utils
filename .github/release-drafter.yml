name-template: $NEXT_PATCH_VERSION
tag-template: plexus-utils-$NEXT_PATCH_VERSION
version-template: $MAJOR.$MINOR.$PATCH
filter-by-commitish: true

categories:
  - title: ":boom: Breaking changes"
    labels:
      - breaking
  - title: 🚨 Removed
    label: removed
  - title: ":tada: Major features and improvements"
    labels:
      - major-enhancement
      - major-rfe
  - title: 🐛 Major bug fixes
    labels:
      - major-bug
  - title: ⚠️ Deprecated
    label: deprecated
  - title: 🚀 New features and improvements
    labels:
      - enhancement
      - feature
      - rfe
  - title: 🐛 Bug Fixes
    labels:
      - bug
      - fix
      - bugfix
      - regression
  - title: ":construction_worker: Changes for plugin developers"
    labels:
      - developer
  - title: 📝 Documentation updates
    label: documentation
  - title: 👻 Maintenance
    labels:
      - chore
      - internal
      - maintenance
  - title: 🔧 Build
    label: build
  - title: 🚦 Tests
    labels:
      - test
      - tests
  - title: 📦 Dependency updates
    labels:
      - dependencies
      - dependency
      - dependency-upgrade
exclude-labels:
  - reverted
  - no-changelog
  - skip-changelog
  - invalid

change-template: '- $TITLE ([#$NUMBER]($URL)) @$AUTHOR'

template: |
  <!-- Optional: add a release summary here -->
  $CHANGES
